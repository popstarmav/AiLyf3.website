<!DOCTYPE html>
<html>
<head>
  <title>Book AiLyf3 Service</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }
    .box { background:white; padding:20px; max-width:500px; margin:auto; border-radius:10px; }
    input, select, textarea { width:100%; padding:10px; margin:8px 0; }
    button { width:100%; padding:12px; background:black; color:white; }
  </style>
</head>

<body>

<div class="box">

<h2>Book a Service</h2>

<form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">

<input type="text" name="name" placeholder="Name" required>
<input type="text" name="phone" placeholder="Phone" required>

<select name="service">
  <option>Computer Repair</option>
  <option>Phone Repair</option>
  <option>WiFi / Network</option>
  <option>Cybersecurity</option>
</select>

<select name="priority">
  <option>Standard</option>
  <option>Priority</option>
  <option>Emergency</option>
</select>

<input type="date" name="date" required>
<input type="time" name="time" required>

<textarea name="details" placeholder="Describe issue"></textarea>

<button type="submit">Submit Request</button>

</form>

</div>

</body>
</html>
